# ----------------------------------------------------------------------------
# Approach summary
# ----------------------------------------------------------------------------
methodology_summary: |
  Transparent rule-based hybrid ranker, CPU-only, no network. A weighted fit
  score over seven components (title, trust-weighted skills, build-evidence,
  experience band, product-vs-consulting company, location, education) is
  multiplied by a behavioural-availability modifier (response rate, activity
  recency, open-to-work, notice period) and by penalty factors for the JD's
  explicit disqualifiers (keyword-stuffer non-engineering titles, CV/speech-only
  without NLP/IR, research-only, consulting-only, title-chasing, LangChain-only
  dabblers). The title + skill-trust interaction defeats the keyword-stuffer
  traps; an internal-consistency check forces ~80 honeypots to the floor so they
  never reach the top 100. Runs end-to-end over 100K candidates in well under
  the 5-minute CPU budget.

